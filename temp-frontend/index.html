<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATARA — Temp Frontend</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Top bar visible solo en móvil -->
  <header id="mobile-topbar">
    <span class="logo">ATARA</span>
    <button id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Backdrop para cerrar el sidebar al tocar fuera -->
  <div id="sidebar-backdrop"></div>

  <div id="app">
    <nav class="sidebar">
      <div class="sidebar-header">
        <span class="logo">ATARA</span>
        <span class="subtitle">Frontend temporal</span>
      </div>
      <!-- Nav generado dinámicamente por main.js según el rol -->
      <ul class="nav-links" id="nav-links">
        <li class="loading" style="padding:20px;font-size:12px">Cargando…</li>
      </ul>
      <div class="backend-status">
        <span id="status-dot" class="dot"></span>
        <span id="status-label">Conectando...</span>
      </div>
    </nav>

    <!-- Área principal: topbar de escritorio + contenido -->
    <div class="main-area">
      <header id="desktop-topbar">
        <div id="topbar-title" class="topbar-title">ATARA</div>
        <div class="topbar-right">
          <div id="topbar-user" class="topbar-user">
            <span id="topbar-avatar" class="topbar-avatar">?</span>
            <div class="topbar-user-info">
              <span id="topbar-nombre" class="topbar-nombre">—</span>
              <span id="topbar-rol" class="topbar-rol badge badge-blue">—</span>
            </div>
            <div class="topbar-menu" id="topbar-menu">
              <button class="topbar-menu-item" id="topbar-btn-sesion">Mi sesión</button>
              <hr class="topbar-menu-sep">
              <button class="topbar-menu-item topbar-menu-danger" id="topbar-btn-logout">Cerrar sesión</button>
            </div>
          </div>
        </div>
      </header>
      <main id="page-content" class="content">
        <p class="loading">Cargando...</p>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
