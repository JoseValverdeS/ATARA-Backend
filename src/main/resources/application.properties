spring.application.name=atara-api

spring.datasource.url=jdbc:postgresql://localhost:5432/atara_db
spring.datasource.username=atara_user
spring.datasource.password=${DB_PASSWORD:atara_pass_123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.schemas=public

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# JWT
jwt.secret=${JWT_SECRET:atara-jwt-clave-secreta-muy-segura-para-desarrollo-local-2024-x}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

